<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
   <nav class="flex text-sm text-gray-500 mb-6 gap-2 flex-wrap">
    <a [routerLink]="['/']" class="breadcrumb-link hover:text-indigo-600 transition">Каталог</a>
    <i class="fas fa-chevron-right text-[10px] self-center text-gray-400"></i>
  </nav>

  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8 gap-4">
    <div>
      <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-gray-900">✨ Загрузить файл импорта</h1>
    </div>
  </div>

  <div class="p-6 max-w-md mx-auto bg-white rounded-xl shadow-md flex items-center space-x-4">
    <div>
      <h2 class="text-xl font-semibold text-gray-700">Загрузка файла</h2>
      <div class="mt-4">
        <input type="file" (change)="onFileSelected($event)" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" />
      </div>
      <button (click)="uploadFile()" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
        Загрузить
      </button>
    </div>
  </div>
</main>
